<!DOCTYPE html>
<html lang="{{ page.language }}">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>{% if page.title and page.title.size > 0 %}{{ page.title }} - {% endif %}{{ site.title }}</title>
    {% seo title=false %}
    {%- assign translation_url = page.translation_url | strip %}
    {%- if translation_url != "" %}
    {%- if page.language == "no" %}
    <link rel="alternate" hreflang="no" href="{{ page.url | absolute_url }}" />
    <link rel="alternate" hreflang="en" href="{{ translation_url | absolute_url }}" />
    {%- else %}
    <link rel="alternate" hreflang="en" href="{{ page.url | absolute_url }}" />
    <link rel="alternate" hreflang="no" href="{{ translation_url | absolute_url }}" />
    {%- endif %}
    {%- endif %}
    <meta
      http-equiv="Content-Security-Policy"
      content="default-src 'self'; img-src 'self' https:; script-src 'self'; frame-src https:;" />
    <link rel="stylesheet" href="/assets/css/main.css" />
    <link rel="icon" type="image/png" href="/assets/favicon.png" />
    <link rel="apple-touch-icon" type="image/png" href="/assets/favicon.png" />

    <link rel="preload" href="/assets/fonts/QuattrocentoSans-Regular.woff2" as="font" type="font/woff2" crossorigin />
    <link rel="preload" href="/assets/fonts/QuattrocentoSans-Bold.woff2" as="font" type="font/woff2" crossorigin />
  </head>
  <body class="body">
    {% include header_{{ page.language }}.html %}
    <main class="main-content">{{ content }}</main>
    {% include footer_{{ page.language }}.html %}
    <script src="/assets/js/navigation.js" defer></script>
  </body>
</html>
